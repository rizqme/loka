name: nodejs
version: "1.0"
description: Node.js / Bun application
before: [static]
image: "{{image}}"
port: 3000
build:
  - "{{pm_install}}"
include:
  - package.json
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - bun.lockb
  - node_modules/
  - dist/
  - build/
  - src/
  - index.js
  - server.js
  - app.js
start: "{{pm_start}}"
health:
  path: /
  interval: 10
  timeout: 5
  retries: 3
