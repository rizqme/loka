name: vite
version: "1.0"
description: Vite application
before: [nodejs]
image: "{{image}}"
port: 4173
build:
  - "{{pm_install}}"
  - "{{pm_run}} build"
include:
  - package.json
  - node_modules/
  - dist/
start: "{{npx}} vite preview --host 0.0.0.0"
health:
  path: /
  interval: 10
  timeout: 5
  retries: 3
