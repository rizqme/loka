name: vite
version: "1.0"
description: Vite/VitePress static site
before: [nodejs]
image: nginx:alpine
port: 80
build:
  - "{{pm_install}}"
  - "{{pm_run}} build"
include:
  - dist/
start: "rm -rf /usr/share/nginx/html && ln -s /workspace/dist /usr/share/nginx/html && nginx -g 'daemon off;'"
health:
  path: /
  interval: 3
  timeout: 5
  retries: 1
